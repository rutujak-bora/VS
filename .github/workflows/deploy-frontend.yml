name: Deploy Frontend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'

jobs:
  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://${{ secrets.BACKEND_IP }}
          CI: "false"
          DISABLE_ESLINT_PLUGIN: "true"
        run: npm run build

      - name: Transfer build to Frontend EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          source: "frontend/build/."
          target: "/var/www/vsfashion"
          strip_components: 2

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FRONTEND_IP }}
          username: ubuntu
          key: ${{ secrets.FRONTEND_SSH_KEY }}
          script: |
            sudo systemctl reload nginx
            echo "Frontend deployed successfully at $(date)"
