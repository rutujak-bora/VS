server {
    listen 80;
    server_name vs-fashion.com www.vs-fashion.com _;

    # Serve the React Frontend
    location / {
        root /var/www/vsfashion;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # Reverse Proxy for the FastAPI Backend (on separate backend server)
    location /api/ {
        proxy_pass http://13.62.51.191/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Reverse Proxy for Uploaded Images (on backend server)
    location /uploads/ {
        proxy_pass http://13.62.51.191/uploads/;
        proxy_set_header Host $host;
    }

    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}
